version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: tutur-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: tutur_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
